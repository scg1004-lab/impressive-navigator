<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Impressive Punta Cana · Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #F5ECD7; --sand-light: #FBF6EC; --taupe: #C4A882; --taupe-dark: #8B7355;
    --burgundy: #7A2E3C; --tropical: #2D6A4F; --turquoise: #1A7A8A;
    --turquoise-light: #4DAAB8; --dark: #1C1A18; --text: #3D3830;
    --text-muted: #8B7F72; --white: #FFFFFF;
    --shadow: 0 8px 32px rgba(28,26,24,0.15); --shadow-sm: 0 2px 12px rgba(28,26,24,0.1);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'DM Sans',sans-serif; background:var(--dark); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  /* HEADER */
  .header { background:var(--dark); padding:12px 16px 10px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; z-index:100; }
  .logo-main { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:300; color:var(--sand); letter-spacing:0.08em; line-height:1; }
  .logo-sub { font-size:9px; color:var(--taupe); letter-spacing:0.2em; text-transform:uppercase; margin-top:2px; }
  .header-badge { display:flex; align-items:center; gap:6px; background:rgba(77,170,184,0.15); border:1px solid rgba(77,170,184,0.3); border-radius:20px; padding:5px 10px; }
  .badge-dot { width:6px; height:6px; border-radius:50%; background:var(--turquoise-light); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }
  .badge-text { font-size:10px; color:var(--turquoise-light); letter-spacing:0.06em; font-weight:500; }

  /* SEARCH */
  .search-wrap { padding:10px 14px 8px; background:var(--dark); flex-shrink:0; }
  .search-box { display:flex; align-items:center; background:rgba(255,255,255,0.1); border-radius:12px; padding:0 14px; border:1.5px solid rgba(255,255,255,0.08); transition:border-color 0.2s; }
  .search-box:focus-within { border-color:var(--taupe); background:rgba(255,255,255,0.15); }
  .search-icon { font-size:15px; opacity:0.5; flex-shrink:0; }
  .search-input { flex:1; border:none; outline:none; padding:11px 10px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--sand); background:transparent; }
  .search-input::placeholder { color:rgba(245,236,215,0.4); }
  .search-clear { background:none; border:none; cursor:pointer; font-size:18px; color:var(--taupe); display:none; padding:4px; }

  /* CHIPS */
  .chips-wrap { padding:8px 14px; display:flex; gap:7px; overflow-x:auto; flex-shrink:0; scrollbar-width:none; background:var(--dark); border-bottom:1px solid rgba(255,255,255,0.06); }
  .chips-wrap::-webkit-scrollbar { display:none; }
  .chip { display:flex; align-items:center; gap:5px; padding:5px 12px; border-radius:20px; border:1.5px solid rgba(196,168,130,0.35); background:transparent; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; color:var(--taupe); cursor:pointer; white-space:nowrap; transition:all 0.18s; flex-shrink:0; }
  .chip.active { background:var(--taupe); border-color:var(--taupe); color:var(--dark); }
  .chip-icon { font-size:13px; }

  /* MAIN */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }

  /* MAP */
  .map-container { flex:1; position:relative; overflow:hidden; background:#1a2a20; cursor:grab; touch-action:none; }
  .map-container:active { cursor:grabbing; }

  .map-inner {
    position:absolute; top:0; left:0;
    transform-origin:0 0;
    will-change:transform;
  }
  .map-img {
    display:block;
    width:900px;
    height:auto;
    user-select:none;
    pointer-events:none;
  }
  .poi-layer {
    position:absolute; top:0; left:0;
    width:900px;
    pointer-events:none;
  }

  /* POI markers */
  .poi {
    position:absolute;
    transform:translate(-50%,-50%);
    pointer-events:all;
    cursor:pointer;
    transition:transform 0.15s;
    z-index:10;
  }
  .poi:hover { transform:translate(-50%,-50%) scale(1.2); }
  .poi.selected { transform:translate(-50%,-50%) scale(1.3); z-index:20; }

  .poi-dot {
    width:28px; height:28px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:13px;
    box-shadow:0 2px 8px rgba(0,0,0,0.4);
    border:2px solid rgba(255,255,255,0.8);
    transition:all 0.15s;
    position:relative;
  }
  .poi.selected .poi-dot {
    width:34px; height:34px; font-size:16px;
    box-shadow:0 0 0 4px rgba(255,255,255,0.3), 0 4px 12px rgba(0,0,0,0.5);
  }
  .poi-label {
    position:absolute;
    top:calc(100% + 3px);
    left:50%; transform:translateX(-50%);
    background:rgba(28,26,24,0.85);
    color:var(--sand);
    font-size:8.5px; font-weight:500;
    padding:2px 5px;
    border-radius:4px;
    white-space:nowrap;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.15s;
    letter-spacing:0.03em;
  }
  .poi:hover .poi-label, .poi.selected .poi-label { opacity:1; }

  /* Route */
  .route-svg { position:absolute; top:0; left:0; width:900px; pointer-events:none; z-index:5; }
  .route-line { stroke:#e05555; stroke-width:3.5; fill:none; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:10 6; animation:dash 1.2s linear infinite; }
  @keyframes dash { to { stroke-dashoffset:-32; } }
  .route-head { fill:#e05555; }

  /* User dot */
  .user-dot {
    position:absolute;
    width:20px; height:20px;
    transform:translate(-50%,-50%);
    z-index:15;
    pointer-events:none;
  }
  .user-ring { position:absolute; inset:-8px; border-radius:50%; background:rgba(122,46,60,0.2); animation:user-pulse 2s infinite; }
  @keyframes user-pulse { 0%,100%{transform:scale(1);opacity:0.3} 50%{transform:scale(1.5);opacity:0.1} }
  .user-inner { position:absolute; inset:0; border-radius:50%; background:var(--burgundy); border:3px solid white; box-shadow:0 2px 8px rgba(0,0,0,0.4); }

  /* Map controls */
  .map-controls { position:absolute; right:12px; bottom:16px; display:flex; flex-direction:column; gap:8px; z-index:30; }
  .map-btn { width:40px; height:40px; border-radius:10px; background:rgba(28,26,24,0.85); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.12); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--sand); transition:background 0.15s; }
  .map-btn:active { background:var(--taupe-dark); }

  /* Walk badge */
  .walk-badge { position:absolute; bottom:68px; left:50%; transform:translateX(-50%); background:var(--burgundy); color:#fff; padding:7px 18px; border-radius:20px; font-size:12px; font-weight:500; display:none; align-items:center; gap:6px; box-shadow:var(--shadow-sm); z-index:30; white-space:nowrap; }
  .walk-badge.show { display:flex; }

  /* From tag */
  .from-tag { position:absolute; top:12px; left:12px; background:rgba(28,26,24,0.82); backdrop-filter:blur(8px); border:1px solid rgba(196,168,130,0.25); border-radius:10px; padding:7px 12px; display:flex; align-items:center; gap:7px; font-size:10px; color:var(--taupe); font-weight:500; letter-spacing:0.04em; z-index:30; }

  /* Results */
  .results-panel { background:var(--dark); flex-shrink:0; max-height:42vh; overflow-y:auto; display:none; border-top:1px solid rgba(255,255,255,0.06); }
  .results-panel.open { display:block; }
  .result-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:background 0.12s; }
  .result-item:active { background:rgba(255,255,255,0.05); }
  .result-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .result-info { flex:1; }
  .result-name { font-size:13px; font-weight:500; color:var(--sand); }
  .result-cat { font-size:11px; color:var(--text-muted); margin-top:1px; }
  .result-dist { font-size:12px; color:var(--taupe); font-weight:500; flex-shrink:0; }

  /* Bottom panel */
  .bottom-panel { background:var(--dark); border-radius:20px 20px 0 0; box-shadow:0 -4px 30px rgba(0,0,0,0.4); padding:0 20px 28px; flex-shrink:0; transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.25,0.8,0.25,1); max-height:55vh; overflow-y:auto; position:relative; z-index:50; border-top:1px solid rgba(196,168,130,0.2); }
  .bottom-panel.open { transform:translateY(0); }
  .panel-handle { width:36px; height:4px; background:rgba(255,255,255,0.12); border-radius:2px; margin:12px auto 16px; }
  .poi-detail-header { display:flex; align-items:flex-start; gap:14px; margin-bottom:12px; }
  .poi-detail-icon { width:50px; height:50px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
  .poi-detail-name { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; color:var(--sand); line-height:1.2; }
  .poi-detail-num { font-size:10px; color:var(--taupe); letter-spacing:0.1em; text-transform:uppercase; margin-top:2px; font-weight:500; }
  .poi-detail-desc { font-size:13px; color:var(--text-muted); line-height:1.6; margin-bottom:14px; }
  .poi-meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
  .poi-tag { display:flex; align-items:center; gap:5px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:5px 10px; font-size:11px; color:var(--taupe); font-weight:500; }
  .nav-btn { width:100%; padding:14px; background:var(--burgundy); color:white; border:none; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; letter-spacing:0.04em; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:background 0.18s; }
  .nav-btn.done { background:#2D6A4F; }
  .nav-btn:active { opacity:0.85; }

  /* Toast */
  .toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(28,26,24,0.95); color:var(--sand); padding:10px 20px; border-radius:30px; font-size:13px; font-weight:500; opacity:0; pointer-events:none; transition:opacity 0.3s; z-index:200; white-space:nowrap; border:1px solid rgba(196,168,130,0.2); }
  .toast.show { opacity:1; }

  /* Legend toggle */
  .legend-btn { position:absolute; top:12px; right:12px; background:rgba(28,26,24,0.85); border:1px solid rgba(196,168,130,0.25); color:var(--taupe); font-size:11px; font-weight:500; border-radius:10px; padding:7px 11px; cursor:pointer; z-index:30; letter-spacing:0.04em; }
  .legend-panel { position:absolute; top:44px; right:12px; background:rgba(22,20,18,0.96); backdrop-filter:blur(12px); border:1px solid rgba(196,168,130,0.2); border-radius:12px; padding:12px 14px; z-index:40; max-width:200px; display:none; }
  .legend-panel.open { display:block; }
  .legend-item { display:flex; align-items:center; gap:8px; margin-bottom:7px; font-size:11px; color:var(--sand); }
  .legend-dot { width:14px; height:14px; border-radius:50%; border:2px solid rgba(255,255,255,0.6); flex-shrink:0; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo-main">Impressive Punta Cana</div>
    <div class="logo-sub">Resort Navigator · Mapa Interactivo</div>
  </div>

</div>

<div class="results-panel" id="resultsPanel"></div>

<div class="main">

      <!-- POI LAYER -->

      <div class="legend-item"><div class="legend-dot" style="background:#5A7A2E"></div>Playa</div>
      <div class="legend-item"><div class="legend-dot" style="background:#8A4A8A"></div>Spa & Wellness</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3A6A9A"></div>Servicios</div>

    <div class="walk-badge" id="walkBadge">🚶 <span id="walkTime">3 min</span> caminando</div>
    <div class="map-controls">
      <button class="map-btn" id="btnZoomIn">＋</button>
      <button class="map-btn" id="btnZoomOut">－</button>

  </div>

  <div class="bottom-panel" id="bottomPanel">
    <div class="panel-handle"></div>
    <div id="panelContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// Lee el parámetro ?desde= de la URL del QR
function getOriginFromURL() {
  const params = new URLSearchParams(window.location.search);
  const desde = params.get('desde');
  if (desde && ORIGINS[desde]) return ORIGINS[desde];
  return { x: 228, y: 472, label: 'Recepción Principal' }; // default
}

const originData = getOriginFromURL();
const USER = { x: originData.x, y: originData.y };

// ─── STATE ────────────────────────────────────────────────────────────────
let activeCat = 'all';
let selectedPoi = null;
let scale = 1, panX = 0, panY = 0;
let isPanning = false, startX, startY, startPanX, startPanY;
let lastPinchDist = 0;

// ─── RENDER POIS ─────────────────────────────────────────────────────────
function renderPois(catFilter='all', query='') {
  const layer = document.getElementById('poiLayer');
  layer.innerHTML = '';
  POIS.forEach(poi => {
    if (catFilter !== 'all' && poi.cat !== catFilter) return;
    if (query && !poi.name.toLowerCase().includes(query.toLowerCase()) &&
        !poi.en.toLowerCase().includes(query.toLowerCase())) return;

    const el = document.createElement('div');
    el.className = 'poi' + (selectedPoi?.id === poi.id ? ' selected' : '');
    el.style.left = poi.x + 'px';
    el.style.top = poi.y + 'px';

    el.innerHTML = `
      <div class="poi-dot" style="background:${poi.color}20; border-color:${poi.color}; color:${poi.color}">
        <span style="font-size:11px">${poi.icon}</span>
      </div>
      <div class="poi-label">${poi.num} ${poi.name}</div>
    `;
    el.addEventListener('click', (e) => { e.stopPropagation(); selectPoi(poi); });
    layer.appendChild(el);
  });
}

// ─── SELECT & PANEL ──────────────────────────────────────────────────────
function selectPoi(poi) {
  selectedPoi = poi;
  document.getElementById('routeSvg').style.display = 'none';
  document.getElementById('walkBadge').classList.remove('show');
  renderPois(activeCat, document.getElementById('searchInput').value);
  showPanel(poi);
  closeResults();
  // Pan map to center on POI
  centerOnPoi(poi);
}

function centerOnPoi(poi) {
  const cont = document.getElementById('mapContainer');
  const cw = cont.clientWidth, ch = cont.clientHeight;
  panX = cw/2 - poi.x * scale;
  panY = ch/2 - poi.y * scale;
  applyTransform();
}

function showPanel(poi) {
  const panel = document.getElementById('bottomPanel');
  document.getElementById('panelContent').innerHTML = `
    <div class="poi-detail-header">
      <div class="poi-detail-icon" style="background:${poi.color}20">${poi.icon}</div>
      <div>
        <div class="poi-detail-name">${poi.name}</div>
        <div class="poi-detail-num">${catLabel(poi.cat)} · Punto ${poi.num}</div>
      </div>
    </div>
    <p class="poi-detail-desc">${poi.desc}</p>
    <div class="poi-meta">${poi.tags.map(t=>`<div class="poi-tag">• ${t}</div>`).join('')}</div>
    <button class="nav-btn" id="navBtn" onclick="startNav()">
      🧭 Cómo llegar · ${poi.walk === 0 ? 'Estás aquí' : poi.walk + ' min a pie'}
    </button>
  `;
  panel.classList.add('open');
}

function catLabel(c) {
  return {pool:'Piscina',food:'Restaurante',bar:'Bar',beach:'Playa',spa:'Spa',shop:'Tienda',service:'Servicio',entertain:'Ocio'}[c]||c;
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────
function startNav() {
  if (!selectedPoi) return;
  if (selectedPoi.walk === 0) { showToast('📍 ¡Ya estás aquí!'); return; }
  drawRoute(USER.x, USER.y, selectedPoi.x, selectedPoi.y);
  document.getElementById('walkBadge').classList.add('show');
  document.getElementById('walkTime').textContent = selectedPoi.walk + ' min';
  const btn = document.getElementById('navBtn');
  if (btn) { btn.className = 'nav-btn done'; btn.textContent = '✓ Ruta activa · Sigue la línea roja'; }
  showToast('🧭 Ruta activada — ¡Buen paseo!');
}

function drawRoute(x1,y1,x2,y2) {
  const svg = document.getElementById('routeSvg');
  svg.style.display = 'block';
  // Simple path: go to nearest corridor then to destination
  const path = document.getElementById('routePath');
  const cx = x1 + (x2-x1)*0.45;
  path.setAttribute('d', `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
}

// ─── CATEGORIES ──────────────────────────────────────────────────────────
document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  activeCat = chip.dataset.cat;
  selectedPoi = null;
  document.getElementById('routeSvg').style.display = 'none';
  document.getElementById('walkBadge').classList.remove('show');
  document.getElementById('bottomPanel').classList.remove('open');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  closeResults();
  renderPois(activeCat, '');
});

// ─── SEARCH ──────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim();
  document.getElementById('searchClear').style.display = q ? 'block' : 'none';
  if (q.length < 2) { closeResults(); renderPois(activeCat,''); return; }
  const matches = POIS.filter(p =>
    p.name.toLowerCase().includes(q.toLowerCase()) ||
    p.en.toLowerCase().includes(q.toLowerCase()) ||
    catLabel(p.cat).toLowerCase().includes(q.toLowerCase())
  );
  showResults(matches);
  renderPois('all', q);
});

document.getElementById('searchClear').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  closeResults(); renderPois(activeCat,'');
});

function showResults(list) {
  const panel = document.getElementById('resultsPanel');
  if (!list.length) {
    panel.innerHTML = `<div class="result-item"><div class="result-info"><div class="result-name" style="color:var(--text-muted)">Sin resultados. Prueba otro término.</div></div></div>`;
    panel.classList.add('open'); return;
  }
  panel.innerHTML = list.map(p => `
    <div class="result-item" onclick="pickResult('${p.id}')">
      <div class="result-icon" style="background:${p.color}20">${p.icon}</div>
      <div class="result-info">
        <div class="result-name">${p.name}</div>
        <div class="result-cat">${p.en} · ${catLabel(p.cat)}</div>
      </div>
      <div class="result-dist">${p.walk===0?'Aquí':p.walk+' min'}</div>
    </div>
  `).join('');
  panel.classList.add('open');
}

function pickResult(id) {
  const poi = POIS.find(p => String(p.id) === String(id));
  if (!poi) return;
  document.getElementById('searchInput').value = poi.name;
  closeResults();
  selectPoi(poi);
}

function closeResults() { document.getElementById('resultsPanel').classList.remove('open'); }

// ─── LEGEND ──────────────────────────────────────────────────────────────
document.getElementById('legendBtn').addEventListener('click', () => {
  document.getElementById('legendPanel').classList.toggle('open');
});

// ─── CLOSE PANEL ─────────────────────────────────────────────────────────
document.getElementById('mapContainer').addEventListener('click', e => {
  if (!e.target.closest('.poi') && !e.target.closest('.from-tag') && !e.target.closest('.legend-btn') && !e.target.closest('.legend-panel') && !e.target.closest('.map-btn') && !e.target.closest('.walk-badge')) {
    document.getElementById('bottomPanel').classList.remove('open');
    document.getElementById('legendPanel').classList.remove('open');
    selectedPoi = null;
    document.getElementById('routeSvg').style.display = 'none';
    document.getElementById('walkBadge').classList.remove('show');
    renderPois(activeCat, document.getElementById('searchInput').value);
  }
});

// ─── TRANSFORM ───────────────────────────────────────────────────────────
function applyTransform() {
  document.getElementById('mapInner').style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
}

// Zoom buttons
document.getElementById('btnZoomIn').addEventListener('click', () => { scale = Math.min(scale*1.3, 4); applyTransform(); });
document.getElementById('btnZoomOut').addEventListener('click', () => { scale = Math.max(scale/1.3, 0.4); applyTransform(); });
document.getElementById('btnCenter').addEventListener('click', () => {
  scale=1; panX=0; panY=0; applyTransform();
  showToast('📍 Vista completa del resort');
});

// Pan
const mc = document.getElementById('mapContainer');
mc.addEventListener('pointerdown', e => {
  if (e.target.closest('.poi') || e.target.closest('.map-btn') || e.target.closest('.from-tag') || e.target.closest('.legend-btn') || e.target.closest('.legend-panel')) return;
  isPanning = true; startX=e.clientX; startY=e.clientY; startPanX=panX; startPanY=panY;
  mc.setPointerCapture(e.pointerId);
});
mc.addEventListener('pointermove', e => {
  if (!isPanning) return;
  panX = startPanX + (e.clientX-startX);
  panY = startPanY + (e.clientY-startY);
  applyTransform();
});
mc.addEventListener('pointerup', () => isPanning=false);

// Pinch zoom
mc.addEventListener('touchstart', e => {
  if (e.touches.length===2) lastPinchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
}, {passive:true});
mc.addEventListener('touchmove', e => {
  if (e.touches.length===2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    scale = Math.min(Math.max(scale*(d/lastPinchDist),0.4),4);
    lastPinchDist=d; applyTransform();
  }
}, {passive:true});

// ─── TOAST ───────────────────────────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── INIT ────────────────────────────────────────────────────────────────
// Wait for image to load to get real dimensions
const img = document.getElementById('mapImg');
img.onload = () => {
  // Set poi layer and route svg height to match image
  const h = img.naturalHeight * (900 / img.naturalWidth);
  document.getElementById('poiLayer').style.height = h + 'px';
  document.getElementById('routeSvg').style.height = h + 'px';
  document.getElementById('routeSvg').setAttribute('viewBox', `0 0 900 ${h}`);
};

// Posicionar punto de usuario según origen del QR
const userDot = document.getElementById('userDot');
userDot.style.left = USER.x + 'px';
userDot.style.top  = USER.y + 'px';
document.getElementById('fromLabel').textContent = originData.label;

renderPois('all','');
setTimeout(()=>showToast('📍 Estás en: ' + originData.label), 900);
</script>
</body>
</html>
